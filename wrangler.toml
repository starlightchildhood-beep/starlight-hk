# Cloudflare Pages Configuration
name = "starlight-hk"
compatibility_date = "2024-01-01"

# Build settings
build_command = "npm run build"
build_output_dir = ".output"

# Routes (optional - Cloudflare Pages handles this automatically)
#pages_build_output_dir = ".next"

# Environment variables for Next.js on Cloudflare
[vars]
NEXT_PUBLIC_SITE_URL = "https://starlight-hk.pages.dev"
